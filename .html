<!DOCTYPE html>
<html>
<body>
<p id="output">
</p>
<script>
  let fullName = "Nguyen Khanh Van";
  let studentId = "27A4043002";
  let parts = fullName.split(" ");
  let lastName = parts[parts.length - 1]; 
  let firstLetters = "";
  for (let i = 0; i < parts.length - 1; i++) {
    firstLetters += parts[i][0];
  }
  let email = lastName.toLowerCase() + firstLetters.toLowerCase() + "." +studentId.toLowerCase() + "@hvnh.edu.vn";
  let coursePeriod = studentId.substring(0, 2);
  let faculty = "Công nghệ thông tin và Kinh tế số";
  let last4 = studentId.substring(studentId.length - 4);
  let sum = 0;
  for (let i = 0; i < last4.length; i++) {
    sum += parseInt(last4[i]);
  }
  let message = "Email: " + email + "<br>" +"Xin chào " + fullName + ", bạn là sinh viên khóa " + coursePeriod +", khoa " + faculty + ", tổng 4 số cuối trong mã sinh viên là " + sum;
  document.getElementById("output").innerHTML = message;
  console.log(message);
</script>
</body>
</html>
